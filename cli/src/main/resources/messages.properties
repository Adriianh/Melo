error.missing_lastfm_key=\
\u2717 Missing required configuration: LASTFM_API_KEY\n\
\n\
Melo needs a Last.fm API key to work.\n\
\n\
1. Create a free API account at:\n\
   https://www.last.fm/api/account/create\n\
\n\
2. Add your key by running:\n\
   melo config set LASTFM_API_KEY your_key_here\n\
\n\
   Or edit the config file directly:\n\
   {configDir}/.env\n\
\n\
Optionally, add Spotify credentials for better search results:\n\
   melo config set SPOTIFY_CLIENT_ID your_id\n\
   melo config set SPOTIFY_CLIENT_SECRET your_secret\n\
   (https://developer.spotify.com/dashboard)\n\

config.set.success=\u2713 {key} saved to {configDir}/.env
config.set.overwrite=\u2713 {key} updated in {configDir}/.env
config.list.empty=No configuration found in {configDir}/.env\nRun: melo config set LASTFM_API_KEY your_key
config.list.header=Configuration ({configDir}/.env):

